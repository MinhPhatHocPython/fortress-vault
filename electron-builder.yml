appId: "com.fortressvault.app"
productName: "Fortress Vault"
copyright: "Copyright © 2025 Fortress Vault Team"
directories:
  output: "release"
  buildResources: "resources"
files:
  - "dist/**/*"
  - "resources/**/*"
  - "package.json"
  - "!node_modules/electron-builder/**"
  - "!node_modules/electron-updater/**"
  - "!node_modules/@types/**"
win:
  target:
    - target: "nsis"
      arch: "x64"
  icon: "resources/icon.ico"
  artifactName: "PasswordVault_Setup.${ext}"
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Fortress Vault"
  installerIcon: "resources/icon.ico"
  uninstallerIcon: "resources/icon.ico"
publish:
  provider: github
  owner: MinhPhatHocPython
  repo: fortress-vault
  releaseType: release
